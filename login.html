    <!-- login section -->
    <div class="container">
      <div class="row d-flex justify-content-center my-2">
        <div class="col-lg-5 col-md-7">
          <div class="form-box">
            <div class="row mb-3">
              <div class="col-12 border-bottom">
                <h3 class="text-center text-light">WealtHome Login</h3>
              </div>
            </div>
            <form>
              <div class="row mb-3">
                <label for="inputPassword3" class="col-12 col-form-label"
                  >Email:
                </label>
                <div class="col-12">
                  <input
                    type="email"
                    class="form-control"
                    id="inputEmail3"
                    placeholder="yourmail@email.com"
                  />
                </div>
              </div>
              <div class="row mb-3">
                <label for="inputPassword3" class="col-12 col-form-label"
                  >Password:
                </label>
                <div class="col-12">
                  <input
                    type="password"
                    class="form-control"
                    id="inputPassword3"
                    placeholder="Your Password"
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-sm-12">
                  <button type="submit" class="btn btn-primary">login</button>
                </div>
              </div>
            </form>
            <div class="row mb3 d-flex justify-content-center">
              <div
                class="col-10 border-top d-flex justify-content-center align-items-center flex-sm-row flex-column"
              >
                <h4 class="text-light">New Here!</h4>
                <a href="/signup.html"

                    Get Started
